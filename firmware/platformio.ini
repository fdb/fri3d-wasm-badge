; Fri3d 2024 badge firmware — first-light port of the emulator to real hardware.
; Config derived verbatim from the Fri3d "buttons" example:
;   https://github.com/Fri3dCamp/badge_2024_arduino/blob/main/examples/platformio%20basic%20examples/buttons/platformio.ini
; Known-good 80 MHz SPI path, TFT_eSPI 2.5.43, N16R8 ESP32-S3 module.

[env:fri3dbadge2024]
platform = espressif32@6.6.0
board = esp32-s3-devkitc-1

; N16R8V variant: 16 MB flash, 8 MB PSRAM (QIO/OPI).
board_build.arduino.memory_type = qio_opi
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB

framework = arduino
monitor_speed = 115200

lib_deps =
    bodmer/TFT_eSPI@2.5.43

build_flags =
    ; PSRAM + native USB CDC (so Serial.println reaches the host via USB-C).
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1

    ; TFT_eSPI inline setup (no User_Setup.h needed when USER_SETUP_LOADED is defined).
    -D USER_SETUP_LOADED
    -D ST7789_DRIVER
    -D USE_HSPI_PORT
    -D TFT_RGB_ORDER=TFT_BGR
    -D TFT_INVERSION_OFF
    -D TFT_WIDTH=296
    -D TFT_HEIGHT=240
    -D TFT_MISO=8
    -D TFT_MOSI=6
    -D TFT_SCLK=7
    -D TFT_CS=5
    -D TFT_DC=4
    -D TFT_RST=48
    -D LOAD_GLCD=1
    -D LOAD_FONT2
    -D LOAD_FONT4
    -D LOAD_FONT6
    -D LOAD_FONT7
    -D LOAD_FONT8
    -D LOAD_GFXFF
    -D SMOOTH_FONT
    -D SPI_FREQUENCY=80000000
