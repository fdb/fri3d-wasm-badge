<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Fri3d WASM Badge — Web Harness</title>
<style>
  html, body {
    background: #05050a;
    color: #ddd;
    font-family: ui-monospace, Menlo, monospace;
    margin: 0;
    padding: 1rem;
  }
  h1 { font-size: 1rem; color: #7b6cff; margin: 0 0 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; }
  .frame {
    display: inline-block;
    padding: 24px 18px;
    background: rgb(24, 27, 34);
    border: 1px solid #2a2470;
    border-radius: 6px;
    box-shadow: 0 0 24px rgba(123, 108, 255, 0.18);
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    border: 1px solid #2a2470;
    background: #05050a;
  }
  .label {
    color: #e8e6ff;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-align: center;
    margin-bottom: 0.75rem;
    text-transform: uppercase;
  }
  .hint {
    color: #4a3fb0;
    font-size: 0.7rem;
    text-align: center;
    margin-top: 0.5rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  #log {
    margin-top: 1rem;
    font-size: 0.7rem;
    color: #888;
    white-space: pre;
    height: 8rem;
    overflow-y: auto;
    background: #000;
    border: 1px solid #2a2470;
    padding: 0.5rem;
    width: 600px;
  }
</style>
</head>
<body>
  <h1>FRI3D//OS · WEB HARNESS · 296×240</h1>
  <div class="frame">
    <div class="label">Fri3d Camp Badge</div>
    <!-- Visible canvas is 2x the native 296x240 resolution for legibility. -->
    <canvas id="screen" width="592" height="480"></canvas>
    <div class="hint">A: OK &nbsp; B: Back &nbsp; Joystick: D-pad</div>
  </div>
  <div id="log"></div>

<script>
// Key bindings match the hardware's input mapping in main.cpp:
//   0=UP 1=DOWN 2=LEFT 3=RIGHT 4=OK 5=BACK
const KEYMAP = {
  ArrowUp: 0, w: 0, W: 0,
  ArrowDown: 1, s: 1, S: 1,
  ArrowLeft: 2, a: 2, A: 2,
  ArrowRight: 3, d: 3, D: 3,
  z: 4, Z: 4, Enter: 4,
  x: 5, X: 5, Backspace: 5,
};
// Event kinds match wasm_host::event: PRESS=0, RELEASE=1, SHORT_PRESS=2, LONG_PRESS=3.
const EVENT_PRESS = 0, EVENT_RELEASE = 1, EVENT_SHORT = 2, EVENT_LONG = 3;
const LONG_PRESS_MS = 300;

// Screen dimensions match firmware/src/screen.h (SCREEN_W/SCREEN_H).
const SCREEN_W = 296, SCREEN_H = 240;

const logEl = document.getElementById('log');
function log(...args) {
  logEl.textContent += args.join(' ') + '\n';
  logEl.scrollTop = logEl.scrollHeight;
}

// The module exposes web_* entry points; we keep cwrap'd references here.
const api = {};
const pressStart = new Map();

var Module = {
  noInitialRun: true,
  print: (txt) => log(txt),
  printErr: (txt) => log('[err]', txt),
  onRuntimeInitialized() {
    api.init         = Module.cwrap('web_init', 'number', []);
    api.render       = Module.cwrap('web_render', null, []);
    api.onInput      = Module.cwrap('web_on_input', null, ['number', 'number']);
    api.pushInput    = Module.cwrap('web_push_input', null, ['number', 'number']);
    api.fbPtr        = Module.cwrap('web_fb', 'number', []);
    api.fbWidth      = Module.cwrap('web_fb_width', 'number', []);
    api.fbHeight     = Module.cwrap('web_fb_height', 'number', []);
    api.screenPtr    = Module.cwrap('web_screen', 'number', []);
    api.rngGet       = Module.cwrap('web_rng_get', 'number', []);
    api.rngSeed      = Module.cwrap('web_rng_seed', null, ['number']);
    if (api.init() !== 0) { log('init failed'); return; }

    setupInput();
    loop();

    // Tiny test surface for Playwright.
    window.fri3d = {
      press(key)           { api.onInput(key, EVENT_PRESS); },
      release(key, heldMs) {
        api.onInput(key, EVENT_RELEASE);
        api.onInput(key, heldMs >= LONG_PRESS_MS ? EVENT_LONG : EVENT_SHORT);
      },
      tap(key, heldMs = 50) {
        this.press(key);
        this.release(key, heldMs);
      },
      render() { api.render(); blit(); },
      rngGet()         { return api.rngGet(); },
      rngSeed(s)       { api.rngSeed(s >>> 0); },
      // Legacy mono framebuffer (still used by ported-pre-color apps).
      readFb() {
        const ptr = api.fbPtr();
        const w = api.fbWidth();
        const h = api.fbHeight();
        return new Uint8Array(Module.HEAPU8.buffer, ptr, w * h).slice();
      },
      // New RGB565 screen, 296x240. Returned as a fresh Uint16Array copy.
      readScreen() {
        const ptr = api.screenPtr();
        return new Uint16Array(Module.HEAPU8.buffer, ptr, SCREEN_W * SCREEN_H).slice();
      },
      bench(frames = 5) {
        const t0 = performance.now();
        for (let i = 0; i < frames; i++) api.render();
        const total = performance.now() - t0;
        return { frames, total_ms: total, per_frame_ms: total / frames };
      },
      KEY: { UP: 0, DOWN: 1, LEFT: 2, RIGHT: 3, OK: 4, BACK: 5 },
      W: SCREEN_W, H: SCREEN_H,
    };
    log('[web] fri3d test surface ready on window.fri3d (296x240 RGB)');
  }
};

function setupInput() {
  document.addEventListener('keydown', (e) => {
    if (e.repeat) return;
    const k = KEYMAP[e.key];
    if (k === undefined) return;
    e.preventDefault();
    pressStart.set(k, performance.now());
    api.pushInput(k, EVENT_PRESS);
  });
  document.addEventListener('keyup', (e) => {
    const k = KEYMAP[e.key];
    if (k === undefined) return;
    e.preventDefault();
    const held = performance.now() - (pressStart.get(k) ?? performance.now());
    pressStart.delete(k);
    api.pushInput(k, EVENT_RELEASE);
    api.pushInput(k, held >= LONG_PRESS_MS ? EVENT_LONG : EVENT_SHORT);
  });
}

// Backing store: one 296x240 RGBA ImageData. We unpack RGB565 → RGBA each
// frame and blit into a 1:1 native canvas, then draw it 2x into the
// visible canvas (image-rendering: pixelated keeps it crisp).
const native = document.createElement('canvas');
native.width = SCREEN_W; native.height = SCREEN_H;
const nctx = native.getContext('2d', { willReadFrequently: true });
const nimg = nctx.createImageData(SCREEN_W, SCREEN_H);
const screen = document.getElementById('screen');
const sx = screen.getContext('2d');
sx.imageSmoothingEnabled = false;

function blit() {
  const ptr = api.screenPtr();
  // RGB565: rrrrrggg gggbbbbb (high byte then low byte in little-endian
  // memory, but we view as Uint16Array so the integer is whole).
  const fb = new Uint16Array(Module.HEAPU8.buffer, ptr, SCREEN_W * SCREEN_H);
  const d = nimg.data;
  for (let i = 0; i < SCREEN_W * SCREEN_H; i++) {
    const v = fb[i];
    // Expand 5/6/5 bits back to 8 bits per channel; replicate top bits
    // into low bits so 0x1F → 0xFF rather than 0xF8 (full-range).
    const r5 = (v >> 11) & 0x1F;
    const g6 = (v >> 5)  & 0x3F;
    const b5 = v & 0x1F;
    const o = i * 4;
    d[o]     = (r5 << 3) | (r5 >> 2);
    d[o + 1] = (g6 << 2) | (g6 >> 4);
    d[o + 2] = (b5 << 3) | (b5 >> 2);
    d[o + 3] = 255;
  }
  nctx.putImageData(nimg, 0, 0);
  sx.drawImage(native, 0, 0, SCREEN_W * 2, SCREEN_H * 2);
}

function loop() {
  api.render();
  blit();
  requestAnimationFrame(loop);
}
</script>
<script src="firmware.js"></script>
</body>
</html>
