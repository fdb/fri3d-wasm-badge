name: Parity

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  canvas-parity:
    name: Canvas parity (C++ vs Rust reference)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Run canvas parity tester
        run: firmware/tools/canvas-parity/run.sh

  regen-check:
    name: Golden regeneration is idempotent
    # Proves that committed goldens still match what tools/visual-golden-gen
    # would produce right now. Catches accidental drift in the Rust reference
    # (fri3d-runtime) or in the tool itself.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install binaryen (wasm-opt)
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - name: Build optimized app WASMs
        run: firmware/scripts/embed_apps.sh

      - name: Regenerate goldens in-place
        run: tools/visual-golden-gen/regen.sh

      - name: Fail if any golden changed
        run: |
          if [[ -n "$(git status --porcelain tests/visual/apps/)" ]]; then
            echo "::error::Goldens drifted. Commit the regenerated PNGs or investigate why fri3d-runtime changed."
            git diff --stat tests/visual/apps/
            exit 1
          fi

  visual-parity:
    name: Visual parity (per-app pixel diff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install binaryen (wasm-opt)
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Run visual parity sweep
        run: firmware/tools/app-runner/visual_parity.sh

      - name: Upload C++ renders on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cpp-renders
          path: /tmp/*_cpp.png
          retention-days: 7

  cargo-test:
    name: Rust unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: cargo test
        run: cargo test
